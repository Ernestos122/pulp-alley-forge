                                <div className="typewriter text-xs" style={{color:'var(--ink-faded)'}}>{upcoming.description}</div>
                            </div>
                        )}
                    </div>

                    {/* ---- RESOURCE TRACKER ---- */}
                    <div className="mb-8 p-4 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                        <div className="typewriter text-xs uppercase tracking-wider mb-3" style={{color:'var(--crimson)'}}>Resources</div>
                        <div className="grid grid-cols-2 gap-3">
                            {['tips', 'backup', 'gear', 'contacts'].map(key => (
                                <div key={key} className="flex items-center justify-between p-2 rounded" style={{background:'var(--paper)', border:'1px solid var(--border)'}}>
                                    <span className="typewriter text-sm capitalize" style={{color:'var(--ink-light)'}}>{key}</span>
                                    <div className="flex items-center gap-2">
                                        <CounterBtn onClick={() => setResource(key, (resources[key] || 0) - 1)} disabled={(resources[key] || 0) <= 0}>-</CounterBtn>
                                        <span className="brand-font text-lg font-bold w-8 text-center" style={{color:'var(--ink)'}}>{resources[key] || 0}</span>
                                        <CounterBtn onClick={() => setResource(key, (resources[key] || 0) + 1)}>+</CounterBtn>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* ---- XP SYSTEM ---- */}
                    <div className="mb-8 p-4 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                        <div className="typewriter text-xs uppercase tracking-wider mb-3" style={{color:'var(--crimson)'}}>Experience Points</div>
                        <div className="flex items-center gap-3 mb-4">
                            <span className="typewriter text-sm" style={{color:'var(--ink-light)'}}>XP Pool:</span>
                            <CounterBtn onClick={() => setCampaignField('xp', Math.max(0, xp - 1))} disabled={xp <= 0}>-</CounterBtn>
                            <span className="brand-font text-xl font-bold w-10 text-center" style={{color:'var(--ink)'}}>{xp}</span>
                            <CounterBtn onClick={() => setCampaignField('xp', xp + 1)}>+</CounterBtn>
                        </div>

                        {league.characters.length > 0 && (
                            <div>
                                <div className="typewriter text-xs mb-2" style={{color:'var(--ink-faded)'}}>Learn Abilities via XP:</div>
                                <div className="space-y-2">
                                    {league.characters.map(c => {
                                        const template = getTemplate(gameData, c.type);
                                        const maxLearned = getMaxLearnedForChar(c);
                                        const learned = getLearnedCount(c);
                                        const cost = xpCostForChar(c);
                                        const canLearn = learned < maxLearned && xp >= cost;
                                        const baseSlots = template ? template.abilitySlots : 0;
                                        return (
                                            <div key={c.id} className="flex items-center justify-between p-2 rounded" style={{background:'var(--paper)', border:'1px solid var(--border)'}}>
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="typewriter text-xs uppercase px-1 py-0.5 rounded" style={{background:LEVEL_COLORS[c.type], color:'var(--paper)'}}>{LEVEL_LABELS[c.type]}</span>
                                                        <span className="brand-font text-sm font-bold" style={{color:'var(--ink)'}}>{c.name || 'Unnamed'}</span>
                                                    </div>
                                                    <div className="typewriter text-xs mt-1" style={{color:'var(--ink-faded)'}}>
                                                        Abilities: {c.abilities.length}/{baseSlots + learned} (base: {baseSlots}, learned: {learned}/{maxLearned}) | Cost: {cost} XP
                                                    </div>
                                                </div>
                                                <button onClick={() => { setXpLearnCharId(c.id); setXpSearchTerm(''); setXpLevelFilter(0); }}
                                                    disabled={!canLearn}
                                                    className="px-3 py-1 rounded typewriter text-xs cursor-pointer hover:opacity-80 disabled:opacity-30 disabled:cursor-not-allowed"
                                                    style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>
                                                    Learn Ability
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {league.characters.length === 0 && (
                            <div className="text-xs typewriter p-3 rounded text-center" style={{background:'var(--paper)', color:'var(--ink-faded)', border:'1px dashed var(--border)'}}>
                                Add characters to your league to spend XP.
                            </div>
                        )}
                    </div>

                    {/* ---- SECRET SOCIETIES ---- */}
                    {reputation >= 30 && (
                        <div className="mb-8 p-4 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                            <div className="typewriter text-xs uppercase tracking-wider mb-3" style={{color:'var(--crimson)'}}>Secret Societies</div>

                            {/* No society joined yet */}
                            {!cs.secretSociety && (
                                <div>
                                    <div className="typewriter text-xs mb-3" style={{color:'var(--ink-faded)'}}>Choose a Secret Society to join:</div>
                                    <div className="space-y-2">
                                        {societies.map(society => (
                                            <div key={society.name}
                                                onClick={() => joinSociety(society.name)}
                                                className="p-3 rounded cursor-pointer transition-all hover:opacity-80"
                                                style={{background:'var(--paper)', border:'2px solid var(--border)'}}>
                                                <div className="brand-font text-sm font-bold" style={{color:'var(--ink)'}}>{society.name}</div>
                                                <div className="typewriter text-xs mt-1" style={{color:'var(--ink-light)'}}>
                                                    {society.ranks.length} ranks | First perk at Rep {society.ranks[0]?.reputationRequired || 30}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Society joined */}
                            {currentSociety && (
                                <div>
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="brand-font text-lg font-bold" style={{color:'var(--ink)'}}>{currentSociety.name}</div>
                                        <button onClick={leaveSociety}
                                            className="typewriter text-xs cursor-pointer hover:opacity-70 underline"
                                            style={{color:'var(--crimson)', background:'none', border:'none'}}>
                                            Leave Society
                                        </button>
                                    </div>

                                    {currentSociety.ranks.map(rank => {
                                        const isUnlocked = reputation >= rank.reputationRequired;
                                        const selectedPerk = societyPerks.find(p => p.rank === rank.rank);
                                        return (
                                            <div key={rank.rank} className="mb-4">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="typewriter text-xs uppercase tracking-wider" style={{color: isUnlocked ? 'var(--crimson)' : 'var(--ink-faded)'}}>
                                                        Rank {rank.rank} — Rep {rank.reputationRequired}
                                                    </span>
                                                    {!isUnlocked && (
                                                        <span className="typewriter text-xs px-1 rounded" style={{background:'var(--border)', color:'var(--ink-faded)'}}>Locked</span>
                                                    )}
                                                </div>
                                                {isUnlocked && (
                                                    <div className="space-y-1">
                                                        {rank.perks.map(perk => {
                                                            const isSelected = selectedPerk?.name === perk.name;
                                                            return (
                                                                <div key={perk.name}
                                                                    onClick={() => selectSocietyPerk(rank.rank, perk.name)}
                                                                    className="p-2 rounded cursor-pointer transition-all hover:opacity-80"
                                                                    style={{
                                                                        background: isSelected ? 'var(--leather)' : 'var(--paper)',
                                                                        border: isSelected ? '2px solid var(--crimson)' : '1px solid var(--border)',
                                                                    }}>
                                                                    <div className="flex items-center gap-2">
                                                                        {isSelected && <span style={{color:'var(--paper)'}}>&#10003;</span>}
                                                                        <span className="brand-font text-sm font-bold" style={{color: isSelected ? 'var(--paper)' : 'var(--ink)'}}>{perk.name}</span>
                                                                    </div>
                                                                    <div className="typewriter text-xs mt-1" style={{color: isSelected ? 'var(--paper-dark)' : 'var(--ink-light)'}}>{perk.description}</div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                                {!isUnlocked && (
                                                    <div className="typewriter text-xs p-2 rounded" style={{background:'var(--paper)', border:'1px dashed var(--border)', color:'var(--ink-faded)'}}>
                                                        Reach {rank.reputationRequired} reputation to unlock rank {rank.rank} perks.
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* ---- HARROWING ESCAPE ROLLER ---- */}
                    {gameData.harrowingEscape && <HarrowingEscapeRoller gameData={gameData} />}

                    {/* ---- XP ABILITY PICKER MODAL ---- */}
                    {xpLearnChar && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.6)'}} onClick={() => setXpLearnCharId(null)}>
                            <div className="p-4 rounded-lg w-full max-w-lg max-h-[80vh] flex flex-col" style={{background:'var(--paper)', border:'2px solid var(--border)'}} onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <h3 className="brand-font text-lg font-bold" style={{color:'var(--ink)'}}>Learn Ability via XP</h3>
                                        <div className="typewriter text-xs" style={{color:'var(--ink-faded)'}}>
                                            {xpLearnChar.name || 'Unnamed'} | Cost: {xpCostForChar(xpLearnChar)} XP | Pool: {xp} XP
                                        </div>
                                    </div>
                                    <button onClick={() => setXpLearnCharId(null)} className="cursor-pointer hover:opacity-70" style={{color:'var(--ink-faded)'}}>
                                        <Icons.X size={18} />
                                    </button>
                                </div>
                                <div className="flex gap-2 mb-3">
                                    <div className="flex-1 relative">
                                        <Icons.Search size={14} className="absolute left-2 top-1/2 -translate-y-1/2" style={{color:'var(--ink-faded)'}} />
                                        <input value={xpSearchTerm} onChange={e => setXpSearchTerm(e.target.value)}
                                            placeholder="Search abilities..."
                                            className="w-full pl-7 pr-2 py-1.5 rounded typewriter text-sm outline-none"
                                            style={{background:'var(--paper-dark)', border:'1px solid var(--border)', color:'var(--ink)'}} />
                                    </div>
                                    <select value={xpLevelFilter} onChange={e => setXpLevelFilter(Number(e.target.value))}
                                        className="px-2 py-1 rounded typewriter text-sm cursor-pointer outline-none"
                                        style={{background:'var(--paper-dark)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                                        <option value={0}>All Levels</option>
                                        {Array.from({length: xpLearnChar.level}, (_,i) => i+1).map(l => <option key={l} value={l}>Level {l}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-1">
                                    {xpBrowseAbilities.map(ab => {
                                        const errors = validateAbilityForCharacter(ab.name, xpLearnChar, gameData);
                                        const blocked = errors.length > 0;
                                        return (
                                            <button key={ab.name}
                                                disabled={blocked}
                                                onClick={() => learnAbility(xpLearnChar, ab.name)}
                                                className="w-full text-left p-2 rounded cursor-pointer transition-all hover:opacity-80 disabled:opacity-40 disabled:cursor-not-allowed"
                                                style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                                                <div className="flex items-center gap-2">
                                                    <span className="brand-font font-bold text-sm" style={{color: blocked ? 'var(--ink-faded)' : 'var(--ink)'}}>{ab.name}</span>
                                                    <span className="typewriter text-xs px-1 rounded" style={{background:'var(--leather)', color:'var(--paper)'}}>L{ab.level}</span>
                                                </div>
                                                <div className="typewriter text-xs mt-0.5" style={{color:'var(--ink-faded)'}}>{ab.description}</div>
                                                {blocked && <div className="typewriter text-xs mt-0.5" style={{color:'var(--crimson)'}}>{errors.join(' | ')}</div>}
                                            </button>
                                        );
                                    })}
                                    {xpBrowseAbilities.length === 0 && (
                                        <div className="text-center typewriter text-sm py-4" style={{color:'var(--ink-faded)'}}>No matching abilities</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5k. PRINTABLE ROSTER
        // ==========================================
        const PrintableRoster = ({ league, gameData }) => {
            const totalSlots = getTotalSlots(league, gameData);
            const usedSlots = getUsedSlots(league, gameData);
            const allAbPool = [...getAllAbilities(gameData), ...(gameData.abilities.epic || [])];
            const activeGenre = league.genre ? (gameData?.genres || []).find(g => g.name === league.genre) : null;

            const COMBAT_SKILLS = ['Brawl', 'Shoot', 'Dodge'];
            const ACTION_SKILLS = ['Might', 'Finesse', 'Cunning'];
            const HEALTH_TRACK = { 'd12': ['d12','d10','d8','d6','Down','Out'], 'd10': ['d10','d8','d6','Down','Out'], 'd8': ['d8','d6','Down','Out'], 'd6': ['d6','Down','Out'], 'd6*': ['d6','Out'], 'none': [] };

            const getHealthDie = (character, template) => {
                if (!template) return 'd6';
                if (league.perks.includes('Duo') && character.type === 'sidekick') return 'd10';
                return template.health;
            };

            // MTG card size: 63mm × 88mm (2.5" × 3.5")
            const CardSt = { card: { breakInside:'avoid', pageBreakInside:'avoid', border:'1.5px solid #3b2a1a', borderRadius:'4px', background:'linear-gradient(145deg, #d4c5a9, #c4b48e)', padding:'0', overflow:'hidden', width:'63mm', height:'88mm', display:'flex', flexDirection:'column', fontFamily:'Special Elite, monospace', fontSize:'8px', color:'#2a1f0e', boxShadow:'1px 1px 2px rgba(0,0,0,0.2)', boxSizing:'border-box' } };

            return (
                <div className="print-only" style={{fontFamily:'Georgia, serif', color:'#000', background:'#fff', padding:'8px'}}>
                    {/* Roster Header */}
                    <div style={{borderBottom:'3px double #3b2a1a', paddingBottom:'6px', marginBottom:'12px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                            <h1 style={{fontFamily:'Playfair Display, Georgia, serif', fontSize:'24px', fontWeight:'bold', margin:0, color:'#2a1f0e'}}>{league.name}</h1>
                            <span style={{fontFamily:'Special Elite, monospace', fontSize:'11px', color:'#5a4a2e'}}>Slots: {usedSlots}/{totalSlots}</span>
                        </div>
                        <div style={{fontSize:'10px', fontFamily:'Special Elite, monospace', color:'#5a4a2e', marginTop:'2px'}}>
                            {league.genre && <span>Genre: {league.genre} | </span>}
                            {league.perks.length > 0 && <span>Perks: {league.perks.join(', ')} | </span>}
                            {(() => { const rules = league.optionalRules || {}; const allS = [{key:'weapons',label:'Weapons'},{key:'supers',label:'Supers'},...(gameData.optionalSettings||[]).map(s=>({key:s.name,label:s.label}))]; const active = allS.filter(s=>rules[s.key]); return active.length > 0 ? <span>Rules: {active.map(s=>s.label).join(', ')}</span> : null; })()}
                        </div>
                        {(() => { const cs = league.campaignState; if (!cs) return null; const hasData = cs.reputation > 0 || cs.xp > 0 || cs.secretSociety || Object.values(cs.resources||{}).some(v=>v>0); if (!hasData) return null; return <div style={{fontSize:'10px', fontFamily:'Special Elite, monospace', color:'#5a4a2e', marginTop:'2px'}}>Rep: {cs.reputation} | XP: {cs.xp}{cs.secretSociety ? ` | ${cs.secretSociety}` : ''}</div>; })()}
                    </div>

                    {/* Character Cards — 2 per row */}
                    <div style={{display:'flex', flexWrap:'wrap', gap:'4mm', justifyContent:'flex-start'}}>
                        {league.characters.map(character => {
                            const template = getTemplate(gameData, character.type);
                            const skills = computeCharacterSkills(character, gameData, activeGenre, league?.optionalRules, league);
                            const healthDie = getHealthDie(character, template);
                            const healthTrack = HEALTH_TRACK[healthDie] || HEALTH_TRACK['d6'];
                            const isActingLeader = league.actingLeaderId === character.id;

                            const allAbs = [...(character.abilities || []), ...(character.freeAbilities || [])];
                            const abDetails = allAbs.map(aName => {
                                const ab = allAbPool.find(a => a.name === aName);
                                const flavour = character.abilityFlavourNames?.[aName];
                                const isFree = (character.freeAbilities || []).includes(aName);
                                return { name: aName, flavour, description: ab?.description || '', isFree };
                            });

                            return (
                                <div key={character.id} style={CardSt.card}>
                                    {/* Card Top: Type + Name */}
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'3px 5px', borderBottom:'1px solid #a89060', background:'rgba(59,47,30,0.08)'}}>
                                        <span style={{fontWeight:'bold', fontSize:'7px', textTransform:'uppercase', letterSpacing:'0.5px', color:'#8b1a1a'}}>
                                            {LEVEL_LABELS[character.type]}{isActingLeader ? ' (Leader)' : ''}:
                                        </span>
                                        <span style={{fontFamily:'Playfair Display, Georgia, serif', fontWeight:'bold', fontSize:'10px'}}>{character.name || 'Unnamed'}</span>
                                    </div>

                                    {/* Card Body: Image + Skills */}
                                    <div style={{display:'flex', padding:'4px 5px', gap:'4px'}}>
                                        {/* Left: Image */}
                                        <div style={{width:'22mm', flexShrink:0}}>
                                            {character.image ? (
                                                <img src={character.image} style={{width:'22mm', height:'22mm', objectFit:'cover', borderRadius:'3px', border:'1px solid #a89060'}} />
                                            ) : (
                                                <div style={{width:'22mm', height:'22mm', borderRadius:'3px', border:'1px solid #a89060', background:'rgba(168,144,96,0.2)', display:'flex', alignItems:'center', justifyContent:'center'}}>
                                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a89060" strokeWidth="1" strokeLinecap="round"><circle cx="12" cy="8" r="5"/><path d="M3 21c0-4.97 4.03-9 9-9s9 4.03 9 9"/></svg>
                                                </div>
                                            )}
                                            {/* Gang models */}
                                            {character.type === 'gang' && <div style={{fontSize:'7px', color:'#5a4a2e', marginTop:'2px', textAlign:'center'}}>Models: {character.gangModels || 5}</div>}
                                        </div>

                                        {/* Right: Skills */}
                                        {skills && (
                                            <div style={{flex:1}}>
                                                {/* Combat Skills — red/salmon */}
                                                <div style={{background:'rgba(180,80,60,0.15)', border:'1px solid rgba(180,80,60,0.3)', borderRadius:'2px', padding:'2px 4px', marginBottom:'2px'}}>
                                                    {COMBAT_SKILLS.map(skill => (
                                                        <div key={skill} style={{display:'flex', justifyContent:'space-between', padding:'0.5px 0', fontSize:'8px'}}>
                                                            <span style={{fontWeight:'bold', color:'#6b2a1a'}}>{skill}</span>
                                                            <span style={{fontWeight:'bold'}}>{skills[skill]?.display || '\u2014'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                {/* Action Skills — green */}
                                                <div style={{background:'rgba(60,120,60,0.12)', border:'1px solid rgba(60,120,60,0.25)', borderRadius:'2px', padding:'2px 4px'}}>
                                                    {ACTION_SKILLS.map(skill => (
                                                        <div key={skill} style={{display:'flex', justifyContent:'space-between', padding:'0.5px 0', fontSize:'8px'}}>
                                                            <span style={{fontWeight:'bold', color:'#2a5a2a'}}>{skill}</span>
                                                            <span style={{fontWeight:'bold'}}>{skills[skill]?.display || '\u2014'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Weapon — if equipped */}
                                    {character.weapon && (() => {
                                        const allWeapons = [...(gameData.weapons?.ranged||[]).map(w=>({...w,group:'Ranged'})), ...(gameData.weapons?.melee||[]).map(w=>({...w,group:'Melee'}))];
                                        const wpn = allWeapons.find(w => w.name === character.weapon);
                                        return (
                                            <div style={{padding:'2px 5px', borderTop:'1px solid #a89060', fontSize:'7px', background:'rgba(139,26,26,0.05)'}}>
                                                <span style={{fontWeight:'bold', color:'#8b1a1a'}}>{character.weapon}</span>
                                                {wpn && <span style={{color:'#5a4a2e'}}> ({wpn.group}): {wpn.description}</span>}
                                            </div>
                                        );
                                    })()}

                                    {/* Abilities Section */}
                                    <div style={{padding:'2px 5px', flex:1, borderTop:'1px solid #a89060', fontSize:'7px', lineHeight:'1.25', overflow:'hidden'}}>
                                        {abDetails.length > 0 ? abDetails.map(ab => (
                                            <div key={ab.name} style={{marginBottom:'1px'}}>
                                                <span style={{fontWeight:'bold'}}>{ab.flavour ? ab.flavour : ab.name}</span>
                                                {ab.flavour && <span style={{color:'#7a6a4e'}}> ({ab.name})</span>}
                                                {ab.isFree && <span style={{color:'#2a6e5a'}}> [free]</span>}
                                                : <span style={{color:'#5a4a2e'}}>{ab.description}</span>
                                            </div>
                                        )) : (
                                            <div style={{color:'#a89060', fontStyle:'italic'}}>No abilities</div>
                                        )}
                                    </div>

                                    {/* Health Track — bottom bar */}
                                    {healthTrack.length > 0 && (
                                        <div style={{display:'flex', alignItems:'center', borderTop:'1.5px solid #3b2a1a', background:'rgba(59,47,30,0.1)', marginTop:'auto'}}>
                                            <span style={{padding:'2px 4px', fontWeight:'bold', fontSize:'7px', color:'#8b1a1a', whiteSpace:'nowrap'}}>Health:</span>
                                            <div style={{display:'flex', flex:1}}>
                                                {healthTrack.map((state, i) => {
                                                    const isDown = state === 'Down';
                                                    const isOut = state === 'Out';
                                                    return (
                                                        <div key={i} style={{
                                                            flex:1, textAlign:'center', padding:'2px 1px', fontSize:'7px', fontWeight:'bold',
                                                            borderLeft: i > 0 ? '1px solid #a89060' : 'none',
                                                            color: isOut ? '#8b1a1a' : isDown ? '#8b6914' : '#2a1f0e',
                                                            background: isOut ? 'rgba(139,26,26,0.1)' : isDown ? 'rgba(139,105,20,0.1)' : 'transparent',
                                                        }}>
                                                            {state}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Associates */}
                    {league.associates.length > 0 && (
                        <div style={{breakInside:'avoid', pageBreakInside:'avoid', marginTop:'12px', border:'2px solid #3b2a1a', borderRadius:'6px', padding:'10px', background:'linear-gradient(145deg, #d4c5a9, #c4b48e)'}}>
                            <div style={{fontFamily:'Playfair Display, Georgia, serif', fontSize:'14px', fontWeight:'bold', borderBottom:'1px solid #a89060', marginBottom:'6px', paddingBottom:'3px', color:'#2a1f0e'}}>Associates</div>
                            {league.associates.map(assoc => (
                                <div key={assoc.id} style={{marginBottom:'6px', fontSize:'10px', fontFamily:'Special Elite, monospace'}}>
                                    <span style={{fontWeight:'bold'}}>{assoc.name || 'Unnamed'}: </span>
                                    {(assoc.abilities || []).map((aName, i) => {
                                        const ab = (gameData.associateAbilities || []).find(a => a.name === aName);
                                        return <span key={aName}>{i > 0 ? ' | ' : ''}{aName}{ab ? ` \u2014 ${ab.description}` : ''}</span>;
                                    })}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5k. EMPTY STATE
        // ==========================================
        const EmptyState = ({ league, onAddLeader, onOpenAddModal }) => {
            const hasChars = league.characters.length > 0;
            const hasLeader = league.characters.some(c => c.type === 'leader');
            const hasSidekick = league.characters.some(c => c.type === 'sidekick');
            const totalSlots = league.characters.reduce((acc, c) => acc + (c.type === 'leader' ? 0 : c.type === 'sidekick' ? 3 : c.type === 'ally' ? 2 : c.type === 'gang' ? 2 : c.type === 'epic' ? 5 : 1), 0);
            const rosterFull = totalSlots >= 10;
            const incompleteChar = hasChars ? league.characters.find(c => c.type !== 'gang' && c.type !== 'follower' && SKILLS.some(s => c.skillAssignments?.[s]?.count == null || c.skillAssignments?.[s]?.diceType == null)) : null;

            let hint = null;
            if (!hasChars) {
                hint = 'Start by creating your Leader — every league needs one.';
            } else if (hasLeader && !hasSidekick && !rosterFull) {
                hint = 'Your Leader is ready! Consider adding a Sidekick (3 slots) or Allies.';
            } else if (incompleteChar) {
                hint = `Select "${incompleteChar.name || 'Unnamed'}" to finish assigning their skills.`;
            } else if (rosterFull) {
                hint = 'Your roster is complete! Review your characters or hit Print.';
            } else {
                hint = 'Choose a character from the sidebar to edit their dossier.';
            }

            return (
                <div className="flex-1 flex items-center justify-center p-6">
                    <div className="text-center">
                        {!hasChars ? (
                            <>
                                <Icons.Users size={48} className="mx-auto mb-4" style={{color:'var(--ink-faded)'}} />
                                <h2 className="brand-font text-xl font-bold mb-2" style={{color:'var(--ink)'}}>Assemble Your League</h2>
                                <p className="typewriter text-sm mb-4" style={{color:'var(--ink-faded)'}}>{hint}</p>
                                <button onClick={onAddLeader}
                                    className="px-6 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                    style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>
                                    Create Leader
                                </button>
                            </>
                        ) : (
                            <>
                                <Icons.FileText size={48} className="mx-auto mb-4" style={{color:'var(--ink-faded)'}} />
                                <h2 className="brand-font text-xl font-bold mb-2" style={{color:'var(--ink)'}}>Select a Character</h2>
                                <p className="typewriter text-sm mb-4" style={{color:'var(--ink-faded)'}}>{hint}</p>
                                {!hasLeader && (
                                    <button onClick={onAddLeader}
                                        className="px-6 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                        style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>
                                        Create Leader
                                    </button>
                                )}
                                {hasLeader && !rosterFull && (
                                    <button onClick={onOpenAddModal}
                                        className="px-5 py-2 rounded typewriter text-sm cursor-pointer hover:opacity-80"
                                        style={{background:'var(--leather)', color:'var(--paper)', border:'1px solid var(--border)'}}>
                                        + Add to Roster
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. LEAGUE SELECTOR COMPONENT
        // ==========================================
        const LeagueSelector = ({ gameData, onSelect, onCreate }) => {
            const [leagues, setLeagues] = useState(() => loadLeagueIndex());
            const importRef = useRef(null);
            const handleImport = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    const league = await importLeagueJSON(file);
                    if (!league.id) league.id = generateUUID();
                    saveLeague(league);
                    onSelect(league);
                } catch { alert('Invalid league file'); }
            };
            const handleDelete = (id, name) => {
                if (!confirm(`Delete league "${name}"?`)) return;
                deleteLeague(id);
                setLeagues(loadLeagueIndex());
            };
            return (
                <div className="h-full flex items-center justify-center" style={{background:'var(--leather)'}}>
                    <div className="p-8 rounded-lg max-w-md w-full" style={{background:'var(--paper)', border:'2px solid var(--border)'}}>
                        <h1 className="text-2xl font-bold brand-font mb-6 text-center" style={{color:'var(--crimson)'}}>LEAGUE DOSSIERS</h1>
                        {leagues.length > 0 && (
                            <div className="mb-6 max-h-64 overflow-y-auto">
                                {leagues.sort((a,b) => b.lastModified - a.lastModified).map(entry => (
                                    <div key={entry.id} className="flex items-center gap-2 mb-2">
                                        <button onClick={() => onSelect(loadLeague(entry.id))}
                                            className="flex-1 text-left p-3 rounded cursor-pointer transition-opacity hover:opacity-80"
                                            style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                                            <div className="font-bold brand-font" style={{color:'var(--ink)'}}>{entry.name}</div>
                                            <div className="text-xs typewriter" style={{color:'var(--ink-faded)'}}>
                                                {new Date(entry.lastModified).toLocaleDateString()}
                                            </div>
                                        </button>
                                        <button onClick={() => handleDelete(entry.id, entry.name)}
                                            className="p-2 rounded cursor-pointer hover:opacity-80" style={{color:'var(--crimson)'}}>
                                            <Icons.Trash2 size={16} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="flex gap-3">
                            <button onClick={onCreate} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>New League</button>
                            <input ref={importRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
                            <button onClick={() => importRef.current.click()} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>Import</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 7. APP INIT
        // ==========================================
        const App = () => {
            const [gameData, setGameData] = useState(null);
            const [league, setLeague] = useState(null);
            const [showLeagueSelector, setShowLeagueSelector] = useState(true);
            const [selectedCharId, setSelectedCharId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [activeView, setActiveView] = useState(null); // null, 'character', 'perks', 'associates', 'campaign', 'settings'
            const [toast, setToast] = useState(null);
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);

            const showToast = (msg, type='info') => { setToast({msg, type}); setTimeout(() => setToast(null), 3000); };

            // Auto-save on league change
            useEffect(() => {
                if (league) {
                    if (!saveLeague(league)) showToast('Storage full — export as JSON to free space', 'error');
                }
            }, [league]);

            const updateLeague = useCallback((updater) => {
                setLeague(prev => typeof updater === 'function' ? updater(prev) : updater);
            }, []);

            const addCharacter = useCallback((type, fromModal = false) => {
                const tmpl = gameData ? getTemplate(gameData, type) : null;
                const newChar = EMPTY_CHARACTER(type, tmpl ? {} : undefined);
                // For follower, pre-fill all skills to 1d6
                if (type === 'follower') {
                    SKILLS.forEach(s => { newChar.skillAssignments[s] = { count: 1, diceType: 'd6' }; });
                }
                // For ally, pre-fill all dice types to d6
                if (type === 'ally') {
                    SKILLS.forEach(s => { newChar.skillAssignments[s] = { ...newChar.skillAssignments[s], diceType: 'd6' }; });
                }
                // Epic: already has freeAbilities: ['Monster'] and extraAbilitySlots: 0 from EMPTY_CHARACTER
                updateLeague(l => ({ ...l, characters: [...l.characters, newChar] }));
                setSelectedCharId(newChar.id);
                setActiveView('character');
                if (fromModal) {
                    const label = LEVEL_LABELS[type] || type;
                    showToast(`Added ${label} — assign their skills and abilities`);
                }
            }, [gameData, updateLeague]);

            const updateCharacter = useCallback((updatedChar) => {
                updateLeague(l => ({
                    ...l,
                    characters: l.characters.map(c => c.id === updatedChar.id ? updatedChar : c),
                }));
            }, [updateLeague]);

            const deleteCharacter = useCallback((charId) => {
                updateLeague(l => ({
                    ...l,
                    characters: l.characters.filter(c => c.id !== charId),
                    actingLeaderId: l.actingLeaderId === charId ? null : l.actingLeaderId,
                }));
                setSelectedCharId(prev => prev === charId ? null : prev);
                setActiveView(prev => prev === 'character' ? null : prev);
            }, [updateLeague]);

            const handleSelectChar = useCallback((id) => {
                setSelectedCharId(id);
                setActiveView('character');
            }, []);

            const handleSetView = useCallback((view) => {
                setActiveView(view);
                if (view !== 'character') setSelectedCharId(null);
            }, []);

            if (!gameData) return <DataLoader onLoad={setGameData} />;
            if (showLeagueSelector || !league) return <LeagueSelector gameData={gameData} onSelect={(l) => { setLeague(l); setShowLeagueSelector(false); }} onCreate={() => { const l = EMPTY_LEAGUE(); setLeague(l); setShowLeagueSelector(false); }} />;

            const selectedChar = activeView === 'character' ? league.characters.find(c => c.id === selectedCharId) : null;

            const renderCenterPanel = () => {
                if (activeView === 'perks') {
                    return <PerkBrowser league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (activeView === 'associates') {
                    return <AssociateBuilder league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (activeView === 'campaign') {
                    return <CampaignPanel league={league} gameData={gameData} updateLeague={updateLeague} updateCharacter={updateCharacter} />;
                }
                if (activeView === 'settings') {
                    return <SettingsPanel league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (selectedChar) {
                    return (
                        <CharacterEditor
                            key={selectedChar.id}
                            character={selectedChar}
                            gameData={gameData}
                            league={league}
                            onUpdate={updateCharacter}
                            onDelete={deleteCharacter}
                            updateLeague={updateLeague}
                        />
                    );
                }
                return (
                    <EmptyState
                        league={league}
                        onAddLeader={() => addCharacter('leader')}
                        onOpenAddModal={() => setShowAddModal(true)}
                    />
                );
            };

            return (
                <div className="h-full flex flex-col" style={{background:'var(--paper)'}}>
                    <TopBar league={league} updateLeague={updateLeague} gameData={gameData}
                        onBack={() => { setShowLeagueSelector(true); setSelectedCharId(null); setActiveView(null); }}
                        onToggleMobileSidebar={() => setMobileSidebarOpen(v => !v)} />

                    <div className="flex-1 overflow-hidden flex no-print">
                        {/* Mobile sidebar overlay */}
                        {mobileSidebarOpen && <div className="mobile-sidebar-overlay" onClick={() => setMobileSidebarOpen(false)} />}
                        <RosterSidebar
                            league={league} gameData={gameData}
                            selectedCharId={selectedCharId}
                            onSelectChar={(id) => { handleSelectChar(id); setMobileSidebarOpen(false); }}
                            onOpenAddModal={() => { setShowAddModal(true); setMobileSidebarOpen(false); }}
                            activeView={activeView}
                            onSetView={(v) => { handleSetView(v); setMobileSidebarOpen(false); }}
                            mobileSidebarOpen={mobileSidebarOpen}
                        />
                        <div className="center-panel" style={{flex:1, overflow:'auto'}}>
                            {renderCenterPanel()}
                        </div>
                    </div>

                    <PrintableRoster league={league} gameData={gameData} />

                    {showAddModal && (
                        <AddCharacterModal
                            league={league} gameData={gameData}
                            onAdd={(type) => addCharacter(type, true)}
                            onClose={() => setShowAddModal(false)}
                        />
                    )}

                    {toast && <div className="fixed top-4 right-4 px-4 py-2 rounded shadow-lg typewriter text-sm toast z-50" style={{background: toast.type==='error'?'var(--crimson)':'var(--leather)', color:'var(--paper)'}}>{toast.msg}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
