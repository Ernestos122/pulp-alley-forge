<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulp Alley League Forge</title>

    <!-- FIX: Disable AMD loader to force UMD scripts to use window globals -->
    <script>window.define = null;</script>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Load Babel for JSX processing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts: Pulp Dossier Style -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:wght@400;700;900&family=Roboto+Slab:wght@400;700&display=swap');

        :root {
            --paper: #d4c5a9;
            --paper-dark: #c4b48e;
            --ink: #2a1f0e;
            --ink-light: #5a4a2e;
            --ink-faded: #7a6a4e;
            --leather: #3b2f1e;
            --crimson: #8b1a1a;
            --border: #a89060;
        }

        body { font-family: 'Roboto Slab', serif; background: var(--leather); color: var(--ink); }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
        .mono-font, .typewriter { font-family: 'Special Elite', cursive; }

        /* Subtle paper texture via CSS gradient */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,115,85,0.03) 2px, rgba(139,115,85,0.03) 4px);
        }

        /* Character level badge colors */
        .badge-leader { color: var(--crimson); }
        .badge-sidekick { color: #2a6e5a; }
        .badge-ally { color: #8b6914; }
        .badge-follower { color: var(--ink-faded); }
        .badge-gang { color: var(--ink-light); }

        /* Print overrides */
        @media print {
            @page { margin: 0.5cm; size: auto; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; margin: 0 !important; padding: 0 !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; position: static !important; width: 100% !important; height: auto !important; visibility: visible !important; }
            .print-only * { visibility: visible !important; }
            .print-card { break-inside: avoid; border: 2px solid #000; border-radius: 4px; margin-bottom: 16px; padding: 12px; background: #fff; page-break-inside: avoid; }
        }
        .print-only { display: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--leather); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-faded); }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        // ==========================================
        // 1. ICONS & CONSTANTS
        // ==========================================
        const { useState, useRef, useEffect, useCallback } = React;

        const createIcon = (path) => ({ size = 24, className = "", strokeWidth = 2, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth={strokeWidth}
                strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {path}
            </svg>
        );

        const Icons = {
            Plus: createIcon(<><path d="M5 12h14"/><path d="M12 5v14"/></>),
            Trash2: createIcon(<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></>),
            Save: createIcon(<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>),
            Printer: createIcon(<><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></>),
            Upload: createIcon(<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>),
            Download: createIcon(<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>),
            X: createIcon(<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>),
            Edit2: createIcon(<path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>),
            Search: createIcon(<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>),
            AlertTriangle: createIcon(<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>),
            Image: createIcon(<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"/></>),
            Users: createIcon(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>),
            ChevronDown: createIcon(<path d="m6 9 6 6 6-6"/>),
            ArrowLeft: createIcon(<><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>),
            FileText: createIcon(<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>),
        };

        const SKILLS = ['Brawl', 'Shoot', 'Dodge', 'Might', 'Finesse', 'Cunning'];
        const DICE_TYPES = ['d6', 'd8', 'd10', 'd12'];
        const DICE_ORDER = { 'd6': 0, 'd8': 1, 'd10': 2, 'd12': 3 };

        const LEVEL_COLORS = {
            leader: 'var(--crimson)',
            sidekick: '#2a6e5a',
            ally: '#8b6914',
            follower: 'var(--ink-faded)',
            gang: 'var(--ink-light)',
            epic: 'var(--crimson)',
        };

        const LEVEL_LABELS = {
            leader: 'Leader', sidekick: 'Sidekick', ally: 'Ally',
            follower: 'Follower', gang: 'Gang', epic: 'Epic',
        };

        // ==========================================
        // 2. DATA & PERSISTENCE
        // ==========================================

        // UUID generator
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        };

        // Empty factories
        const EMPTY_CHARACTER = (type, template) => ({
            id: generateUUID(),
            name: '',
            type,
            level: type,
            image: null,
            skillAssignments: Object.fromEntries(
                ['Brawl','Shoot','Dodge','Might','Finesse','Cunning'].map(s => [s, {count: null, diceType: null}])
            ),
            abilities: [],
            abilityFlavourNames: {},
            abilityChoices: {},
            freeAbilities: [],
            gangModels: type === 'gang' ? 5 : null,
            ...(template || {}),
        });

        const EMPTY_ASSOCIATE = () => ({
            id: generateUUID(),
            name: '',
            abilities: [],
        });

        const EMPTY_LEAGUE = () => ({
            id: generateUUID(),
            name: 'New League',
            characters: [],
            perks: [],
            associates: [],
            campaignState: {
                reputation: 0,
                xp: 0,
                resources: { tips: 0, backup: 0, gear: 0, contacts: 0 },
                secretSociety: null,
                secretSocietyPerks: [],
            },
            genre: null,
            optionalRules: { weapons: false, harrowing: false, supers: false },
        });

        // LocalStorage helpers
        const LEAGUE_INDEX_KEY = 'pulpAlley_leagueIndex';
        const LEAGUE_PREFIX = 'pulpAlley_league_';
        const DATA_CACHE_KEY = 'pulpAlley_dataCache';

        const loadLeagueIndex = () => {
            try { return JSON.parse(localStorage.getItem(LEAGUE_INDEX_KEY)) || []; }
            catch { return []; }
        };

        const saveLeagueIndex = (index) => {
            try { localStorage.setItem(LEAGUE_INDEX_KEY, JSON.stringify(index)); }
            catch (e) { console.warn('Could not save league index:', e); }
        };

        const loadLeague = (id) => {
            try { return JSON.parse(localStorage.getItem(LEAGUE_PREFIX + id)); }
            catch { return null; }
        };

        const saveLeague = (league) => {
            try {
                localStorage.setItem(LEAGUE_PREFIX + league.id, JSON.stringify(league));
                const index = loadLeagueIndex();
                const existing = index.findIndex(e => e.id === league.id);
                const entry = { id: league.id, name: league.name, lastModified: Date.now() };
                if (existing >= 0) index[existing] = entry;
                else index.push(entry);
                saveLeagueIndex(index);
                return true;
            } catch (e) {
                console.warn('Could not save league:', e);
                return false;
            }
        };

        const deleteLeague = (id) => {
            try { localStorage.removeItem(LEAGUE_PREFIX + id); } catch {}
            const index = loadLeagueIndex().filter(e => e.id !== id);
            saveLeagueIndex(index);
        };

        // Export/Import helpers
        const exportLeagueJSON = (league) => {
            const blob = new Blob([JSON.stringify(league, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${league.name || 'league'}_league.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        const importLeagueJSON = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => { try { resolve(JSON.parse(e.target.result)); } catch { reject(new Error('Invalid JSON')); } };
            reader.onerror = () => reject(new Error('File read error'));
            reader.readAsText(file);
        });

        const resizeImage = (file, maxSize = 128) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
                    const w = Math.round(img.width * scale);
                    const h = Math.round(img.height * scale);
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.onerror = () => reject(new Error('Image load error'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('File read error'));
            reader.readAsDataURL(file);
        });

        // ==========================================
        // 3. DATA LOADER COMPONENT
        // ==========================================
        const DataLoader = ({ onLoad }) => {
            const fileRef = useRef(null);
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        try { localStorage.setItem('pulpAlley_dataCache', ev.target.result); }
                        catch (storageErr) { console.warn('Could not cache data:', storageErr); }
                        onLoad(data);
                    } catch (err) { alert('Invalid JSON file'); }
                };
                reader.readAsText(file);
            };
            useEffect(() => {
                const cached = localStorage.getItem('pulpAlley_dataCache');
                if (cached) { try { onLoad(JSON.parse(cached)); } catch(e) {} }
            }, []);
            return (
                <div className="h-full flex items-center justify-center" style={{background:'var(--leather)'}}>
                    <div className="text-center p-12 rounded-lg" style={{background:'var(--paper)',border:'2px solid var(--border)'}}>
                        <h1 className="text-3xl font-bold brand-font mb-2" style={{color:'var(--crimson)'}}>PULP ALLEY</h1>
                        <h2 className="text-lg typewriter mb-6" style={{color:'var(--ink-light)'}}>LEAGUE FORGE</h2>
                        <p className="typewriter mb-6 text-sm" style={{color:'var(--ink-faded)'}}>Load your PulpAlley_Data.json to begin</p>
                        <input ref={fileRef} type="file" accept=".json" onChange={handleFile} className="hidden" />
                        <button onClick={() => fileRef.current.click()}
                            className="px-6 py-3 rounded typewriter text-lg cursor-pointer transition-opacity hover:opacity-80"
                            style={{background:'var(--crimson)',color:'var(--paper)',border:'none'}}>
                            Load Data File
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. LEAGUE SELECTOR COMPONENT
        // ==========================================
        const LeagueSelector = ({ gameData, onSelect, onCreate }) => {
            const [leagues, setLeagues] = useState(() => loadLeagueIndex());
            const importRef = useRef(null);
            const handleImport = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    const league = await importLeagueJSON(file);
                    if (!league.id) league.id = generateUUID();
                    saveLeague(league);
                    onSelect(league);
                } catch { alert('Invalid league file'); }
            };
            const handleDelete = (id, name) => {
                if (!confirm(`Delete league "${name}"?`)) return;
                deleteLeague(id);
                setLeagues(loadLeagueIndex());
            };
            return (
                <div className="h-full flex items-center justify-center" style={{background:'var(--leather)'}}>
                    <div className="p-8 rounded-lg max-w-md w-full" style={{background:'var(--paper)', border:'2px solid var(--border)'}}>
                        <h1 className="text-2xl font-bold brand-font mb-6 text-center" style={{color:'var(--crimson)'}}>LEAGUE DOSSIERS</h1>
                        {leagues.length > 0 && (
                            <div className="mb-6 max-h-64 overflow-y-auto">
                                {leagues.sort((a,b) => b.lastModified - a.lastModified).map(entry => (
                                    <div key={entry.id} className="flex items-center gap-2 mb-2">
                                        <button onClick={() => onSelect(loadLeague(entry.id))}
                                            className="flex-1 text-left p-3 rounded cursor-pointer transition-opacity hover:opacity-80"
                                            style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                                            <div className="font-bold brand-font" style={{color:'var(--ink)'}}>{entry.name}</div>
                                            <div className="text-xs typewriter" style={{color:'var(--ink-faded)'}}>
                                                {new Date(entry.lastModified).toLocaleDateString()}
                                            </div>
                                        </button>
                                        <button onClick={() => handleDelete(entry.id, entry.name)}
                                            className="p-2 rounded cursor-pointer hover:opacity-80" style={{color:'var(--crimson)'}}>
                                            <Icons.Trash2 size={16} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="flex gap-3">
                            <button onClick={onCreate} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>New League</button>
                            <input ref={importRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
                            <button onClick={() => importRef.current.click()} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>Import</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 7. APP INIT
        // ==========================================
        const App = () => {
            const [gameData, setGameData] = useState(null);
            const [league, setLeague] = useState(null);
            const [showLeagueSelector, setShowLeagueSelector] = useState(true);
            const [activeView, setActiveView] = useState('roster');
            const [selectedCharId, setSelectedCharId] = useState(null);
            const [toast, setToast] = useState(null);

            const showToast = (msg, type='info') => { setToast({msg, type}); setTimeout(() => setToast(null), 3000); };

            // Auto-save on league change
            useEffect(() => {
                if (league) {
                    if (!saveLeague(league)) showToast('Storage full — export as JSON to free space', 'error');
                }
            }, [league]);

            const updateLeague = useCallback((updater) => {
                setLeague(prev => typeof updater === 'function' ? updater(prev) : updater);
            }, []);

            if (!gameData) return <DataLoader onLoad={setGameData} />;
            if (showLeagueSelector || !league) return <LeagueSelector gameData={gameData} onSelect={(l) => { setLeague(l); setShowLeagueSelector(false); }} onCreate={() => { const l = EMPTY_LEAGUE(); setLeague(l); setShowLeagueSelector(false); }} />;

            return (
                <div className="h-full flex flex-col" style={{background:'var(--paper)'}}>
                    {/* TopBar placeholder */}
                    <div className="p-2 flex items-center justify-between no-print" style={{background:'var(--leather)', borderBottom:'3px solid var(--crimson)'}}>
                        <div className="flex items-center gap-3">
                            <button onClick={() => { setShowLeagueSelector(true); setSelectedCharId(null); }} className="cursor-pointer" style={{color:'var(--paper)'}}>
                                <Icons.ArrowLeft size={18} />
                            </button>
                            <span className="typewriter text-sm tracking-widest" style={{color:'var(--crimson)'}}>PULP ALLEY — LEAGUE DOSSIER</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <input value={league.name} onChange={(e) => updateLeague(l => ({...l, name: e.target.value}))}
                                className="bg-transparent border-b typewriter text-sm px-1 outline-none" style={{color:'var(--paper)', borderColor:'var(--crimson)', width:'180px'}} />
                            <button onClick={() => exportLeagueJSON(league)} className="cursor-pointer p-1 rounded hover:opacity-80" style={{color:'var(--paper)'}} title="Export JSON">
                                <Icons.Download size={16} />
                            </button>
                            <button onClick={() => window.print()} className="cursor-pointer p-1 rounded hover:opacity-80" style={{color:'var(--paper)'}} title="Print">
                                <Icons.Printer size={16} />
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-hidden flex">
                        {/* Sidebar placeholder */}
                        <div className="w-60 overflow-y-auto p-3 no-print" style={{background:'var(--paper-dark)', borderRight:'2px solid var(--border)'}}>
                            <div className="typewriter text-xs uppercase tracking-wider mb-2" style={{color:'var(--crimson)'}}>Field Operatives</div>
                            {league.characters.length === 0 ? (
                                <p className="text-xs typewriter" style={{color:'var(--ink-faded)'}}>No operatives yet</p>
                            ) : league.characters.map(c => (
                                <div key={c.id} onClick={() => { setSelectedCharId(c.id); setActiveView('character'); }}
                                    className="p-2 mb-2 rounded cursor-pointer"
                                    style={{background:'var(--paper)', border: selectedCharId === c.id ? '2px solid var(--crimson)' : '1px solid var(--border)', borderLeft: `3px solid ${LEVEL_COLORS[c.type]}`}}>
                                    <div className="typewriter text-xs uppercase" style={{color: LEVEL_COLORS[c.type]}}>{LEVEL_LABELS[c.type]}</div>
                                    <div className="brand-font text-sm font-bold" style={{color:'var(--ink)'}}>{c.name || 'Unnamed'}</div>
                                </div>
                            ))}
                        </div>
                        {/* Center panel placeholder */}
                        <div className="flex-1 overflow-y-auto p-6">
                            <p className="typewriter" style={{color:'var(--ink)'}}>
                                {activeView} view — {league.characters.length} characters
                            </p>
                        </div>
                    </div>
                    {toast && <div className="fixed top-4 right-4 px-4 py-2 rounded shadow-lg typewriter text-sm toast" style={{background: toast.type==='error'?'var(--crimson)':'var(--leather)', color:'var(--paper)'}}>{toast.msg}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
