                        {activeGenre && (
                            <div style={{fontSize:'10px', fontFamily:'Special Elite, monospace', marginTop:'4px', color:'#555'}}>
                                <div style={{fontWeight:'bold', marginBottom:'2px'}}>Genre: {activeGenre.name}</div>
                                {activeGenre.modifiers.map(mod => (
                                    <div key={mod.name} style={{marginLeft:'12px', marginBottom:'2px'}}>
                                        <span style={{fontWeight:'bold'}}>{mod.name}</span> — {mod.description}
                                    </div>
                                ))}
                            </div>
                        )}
                        {(() => {
                            const rules = league.optionalRules || {};
                            const coreDescriptions = {
                                weapons: 'Characters may equip weapons (Ranged and Melee). Each character may carry one weapon.',
                                supers: 'Allows Epic characters in the league roster. Epic characters cost 5 roster slots and have access to Epic Abilities.',
                            };
                            const allSettings = [
                                { key: 'weapons', label: 'Weapons', description: coreDescriptions.weapons },
                                { key: 'supers', label: 'Supers', description: coreDescriptions.supers },
                                ...(gameData.optionalSettings || []).map(s => ({ key: s.name, label: s.label, description: s.description })),
                            ];
                            const active = allSettings.filter(s => rules[s.key]);
                            if (active.length === 0) return null;
                            return (
                                <div style={{fontSize:'10px', fontFamily:'Special Elite, monospace', marginTop:'4px', color:'#555'}}>
                                    <div style={{fontWeight:'bold', marginBottom:'2px'}}>Optional Rules:</div>
                                    {active.map(s => (
                                        <div key={s.key} style={{marginLeft:'12px', marginBottom:'2px'}}>
                                            <span style={{fontWeight:'bold'}}>{s.label}</span> — {s.description}
                                        </div>
                                    ))}
                                </div>
                            );
                        })()}
                        {(() => {
                            const cs = league.campaignState;
                            if (!cs) return null;
                            const hasData = cs.reputation > 0 || cs.xp > 0 || cs.secretSociety ||
                                Object.values(cs.resources || {}).some(v => v > 0);
                            if (!hasData) return null;
                            return (
                                <div style={{fontSize:'11px', fontFamily:'Special Elite, monospace', marginTop:'4px', borderTop:'1px solid #ccc', paddingTop:'4px'}}>
                                    {cs.reputation > 0 && <span>Reputation: {cs.reputation}</span>}
                                    {cs.xp > 0 && <span> | XP: {cs.xp}</span>}
                                    {Object.entries(cs.resources || {}).filter(([,v]) => v > 0).map(([k,v]) => (
                                        <span key={k}> | {k.charAt(0).toUpperCase() + k.slice(1)}: {v}</span>
                                    ))}
                                    {cs.secretSociety && <span> | Society: {cs.secretSociety}</span>}
                                </div>
                            );
                        })()}
                    </div>

                    {/* Character Cards — 2 per row */}
                    <div style={{display:'flex', flexWrap:'wrap', gap:'4mm', justifyContent:'flex-start'}}>
                        {league.characters.map(character => {
                            const template = getTemplate(gameData, character.type);
                            const skills = computeCharacterSkills(character, gameData, activeGenre);
                            const healthDie = getHealthDie(character, template);
                            const healthTrack = HEALTH_TRACK[healthDie] || HEALTH_TRACK['d6'];
                            const isActingLeader = league.actingLeaderId === character.id;

                            const allAbs = [...(character.abilities || []), ...(character.freeAbilities || [])];
                            const abDetails = allAbs.map(aName => {
                                const ab = allAbPool.find(a => a.name === aName);
                                const flavour = character.abilityFlavourNames?.[aName];
                                const isFree = (character.freeAbilities || []).includes(aName);
                                return { name: aName, flavour, description: ab?.description || '', isFree };
                            });

                            return (
                                <div key={character.id} style={CardSt.card}>
                                    {/* Card Top: Type + Name */}
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'3px 5px', borderBottom:'1px solid #a89060', background:'rgba(59,47,30,0.08)'}}>
                                        <span style={{fontWeight:'bold', fontSize:'7px', textTransform:'uppercase', letterSpacing:'0.5px', color:'#8b1a1a'}}>
                                            {LEVEL_LABELS[character.type]}{isActingLeader ? ' (Leader)' : ''}:
                                        </span>
                                        <span style={{fontFamily:'Playfair Display, Georgia, serif', fontWeight:'bold', fontSize:'10px'}}>{character.name || 'Unnamed'}</span>
                                    </div>

                                    {/* Card Body: Image + Skills */}
                                    <div style={{display:'flex', padding:'4px 5px', gap:'4px'}}>
                                        {/* Left: Image */}
                                        <div style={{width:'22mm', flexShrink:0}}>
                                            {character.image ? (
                                                <img src={character.image} style={{width:'22mm', height:'22mm', objectFit:'cover', borderRadius:'3px', border:'1px solid #a89060'}} />
                                            ) : (
                                                <div style={{width:'22mm', height:'22mm', borderRadius:'3px', border:'1px solid #a89060', background:'rgba(168,144,96,0.2)', display:'flex', alignItems:'center', justifyContent:'center'}}>
                                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a89060" strokeWidth="1" strokeLinecap="round"><circle cx="12" cy="8" r="5"/><path d="M3 21c0-4.97 4.03-9 9-9s9 4.03 9 9"/></svg>
                                                </div>
                                            )}
                                            {/* Gang models — computed: 6 with Sixth-Man, else 5 */}
                                            {character.type === 'gang' && <div style={{fontSize:'7px', color:'#5a4a2e', marginTop:'2px', textAlign:'center'}}>Models: {([...(character.abilities||[]), ...(character.freeAbilities||[])].includes('Sixth-Man')) ? 6 : 5}</div>}
                                        </div>

                                        {/* Right: Skills */}
                                        {skills && (
                                            <div style={{flex:1}}>
                                                {/* Combat Skills — red/salmon */}
                                                <div style={{background:'rgba(180,80,60,0.15)', border:'1px solid rgba(180,80,60,0.3)', borderRadius:'2px', padding:'2px 4px', marginBottom:'2px'}}>
                                                    {COMBAT_SKILLS.map(skill => (
                                                        <div key={skill} style={{display:'flex', justifyContent:'space-between', padding:'0.5px 0', fontSize:'8px'}}>
                                                            <span style={{fontWeight:'bold', color:'#6b2a1a'}}>{skill}</span>
                                                            <span style={{fontWeight:'bold'}}>{skills[skill]?.display || '\u2014'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                {/* Action Skills — green */}
                                                <div style={{background:'rgba(60,120,60,0.12)', border:'1px solid rgba(60,120,60,0.25)', borderRadius:'2px', padding:'2px 4px'}}>
                                                    {ACTION_SKILLS.map(skill => (
                                                        <div key={skill} style={{display:'flex', justifyContent:'space-between', padding:'0.5px 0', fontSize:'8px'}}>
                                                            <span style={{fontWeight:'bold', color:'#2a5a2a'}}>{skill}</span>
                                                            <span style={{fontWeight:'bold'}}>{skills[skill]?.display || '\u2014'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Weapon — if equipped */}
                                    {character.weapon && (() => {
                                        const allWeapons = [...(gameData.weapons?.ranged||[]).map(w=>({...w,group:'Ranged'})), ...(gameData.weapons?.melee||[]).map(w=>({...w,group:'Melee'}))];
                                        const wpn = allWeapons.find(w => w.name === character.weapon);
                                        return (
                                            <div style={{padding:'2px 5px', borderTop:'1px solid #a89060', fontSize:'7px', background:'rgba(139,26,26,0.05)'}}>
                                                <span style={{fontWeight:'bold', color:'#8b1a1a'}}>{character.weapon}</span>
                                                {wpn && <span style={{color:'#5a4a2e'}}> ({wpn.group}): {wpn.description}</span>}
                                            </div>
                                        );
                                    })()}

                                    {/* Abilities Section */}
                                    <div style={{padding:'2px 5px', flex:1, borderTop:'1px solid #a89060', fontSize:'7px', lineHeight:'1.25', overflow:'hidden'}}>
                                        {abDetails.length > 0 ? abDetails.map(ab => (
                                            <div key={ab.name} style={{marginBottom:'1px'}}>
                                                <span style={{fontWeight:'bold'}}>{ab.flavour ? ab.flavour : ab.name}</span>
                                                {ab.flavour && <span style={{color:'#7a6a4e'}}> ({ab.name})</span>}
                                                {ab.isFree && <span style={{color:'#2a6e5a'}}> [free]</span>}
                                                : <span style={{color:'#5a4a2e'}}>{ab.description}</span>
                                            </div>
                                        )) : (
                                            <div style={{color:'#a89060', fontStyle:'italic'}}>No abilities</div>
                                        )}
                                    </div>

                                    {/* Health Track — bottom bar */}
                                    {healthTrack.length > 0 && (
                                        <div style={{display:'flex', alignItems:'center', borderTop:'1.5px solid #3b2a1a', background:'rgba(59,47,30,0.1)', marginTop:'auto'}}>
                                            <span style={{padding:'2px 4px', fontWeight:'bold', fontSize:'7px', color:'#8b1a1a', whiteSpace:'nowrap'}}>Health:</span>
                                            <div style={{display:'flex', flex:1}}>
                                                {healthTrack.map((state, i) => {
                                                    const isDown = state === 'Down';
                                                    const isOut = state === 'Out';
                                                    return (
                                                        <div key={i} style={{
                                                            flex:1, textAlign:'center', padding:'2px 1px', fontSize:'7px', fontWeight:'bold',
                                                            borderLeft: i > 0 ? '1px solid #a89060' : 'none',
                                                            color: isOut ? '#8b1a1a' : isDown ? '#8b6914' : '#2a1f0e',
                                                            background: isOut ? 'rgba(139,26,26,0.1)' : isDown ? 'rgba(139,105,20,0.1)' : 'transparent',
                                                        }}>
                                                            {state}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    {/* Gang KO info — replaces health track */}
                                    {character.type === 'gang' && (() => {
                                        const allGangAbs = [...(character.abilities || []), ...(character.freeAbilities || [])];
                                        const hasLoyal = allGangAbs.includes('Loyal');
                                        const koThreshold = hasLoyal ? '\u22641 model' : '\u22642 models';
                                        return (
                                            <div style={{display:'flex', alignItems:'center', borderTop:'1.5px solid #3b2a1a', background:'rgba(59,47,30,0.1)', marginTop:'auto', padding:'2px 4px'}}>
                                                <span style={{fontWeight:'bold', fontSize:'7px', color:'#8b1a1a', whiteSpace:'nowrap', marginRight:'4px'}}>KO:</span>
                                                <span style={{fontSize:'7px', color:'#2a1f0e'}}>Knocked out at {koThreshold}</span>
                                            </div>
                                        );
                                    })()}
                                </div>
                            );
                        })}
                    </div>

                    {/* Associates */}
                    {league.associates.length > 0 && (
                        <div style={{breakInside:'avoid', pageBreakInside:'avoid', marginTop:'12px', border:'2px solid #3b2a1a', borderRadius:'6px', padding:'10px', background:'linear-gradient(145deg, #d4c5a9, #c4b48e)'}}>
                            <div style={{fontFamily:'Playfair Display, Georgia, serif', fontSize:'14px', fontWeight:'bold', borderBottom:'1px solid #a89060', marginBottom:'6px', paddingBottom:'3px', color:'#2a1f0e'}}>Associates</div>
                            {league.associates.map(assoc => (
                                <div key={assoc.id} style={{marginBottom:'6px', fontSize:'10px', fontFamily:'Special Elite, monospace'}}>
                                    <span style={{fontWeight:'bold'}}>{assoc.name || 'Unnamed'}: </span>
                                    {(assoc.abilities || []).map((aName, i) => {
                                        const ab = (gameData.associateAbilities || []).find(a => a.name === aName);
                                        return <span key={aName}>{i > 0 ? ' | ' : ''}{aName}{ab ? ` \u2014 ${ab.description}` : ''}</span>;
                                    })}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* === REFERENCE APPENDIX === */}
                    {(() => {
                        const refCard = (title, children) => (
                            <div style={{breakInside:'avoid', pageBreakInside:'avoid', border:'2px solid #000', borderRadius:'4px', padding:'12px', marginTop:'16px', background:'#fff'}}>
                                <div style={{fontFamily:'Playfair Display, Georgia, serif', fontSize:'14px', fontWeight:'bold', borderBottom:'2px solid #000', marginBottom:'8px', paddingBottom:'4px'}}>{title}</div>
                                <div style={{fontSize:'10px', fontFamily:'Special Elite, monospace'}}>{children}</div>
                            </div>
                        );
                        const tblSt = {width:'100%', borderCollapse:'collapse', fontSize:'10px', fontFamily:'Special Elite, monospace'};
                        const thSt = {textAlign:'left', padding:'3px 6px', borderBottom:'2px solid #000', fontWeight:'bold', background:'#f0f0f0'};
                        const tdSt = {padding:'3px 6px', borderBottom:'1px solid #ccc', verticalAlign:'top'};
                        return (
                            <React.Fragment>

                            {/* 1. Quick Reference */}
                            {printSettings.quickReference && gameData.quickReference && refCard(gameData.quickReference.title, (
                                <div>
                                    {gameData.quickReference.phases.map(phase => (
                                        <div key={phase.name} style={{marginBottom:'6px'}}>
                                            <div style={{fontWeight:'bold', marginBottom:'2px'}}>{phase.name}</div>
                                            {phase.description && <div>{phase.description}</div>}
                                            {phase.steps && <div>{phase.steps.map((s, i) => <div key={i} style={{marginLeft:'8px'}}>{s}</div>)}</div>}
                                        </div>
                                    ))}
                                    <div style={{marginTop:'6px', borderTop:'1px solid #ccc', paddingTop:'4px'}}>{gameData.quickReference.diceRules}</div>
                                </div>
                            ))}

                            {/* 2. Character Templates */}
                            {printSettings.characterTemplates && gameData.characterTemplates && refCard('Character Templates', (
                                <table style={tblSt}>
                                    <thead><tr>
                                        <th style={thSt}>Type</th><th style={thSt}>Lvl</th><th style={thSt}>Health</th>
                                        <th style={thSt}>Pools</th><th style={thSt}>Dice</th><th style={thSt}>Abilities</th>
                                        <th style={thSt}>Max Lvl</th><th style={thSt}>Slots</th>
                                    </tr></thead>
                                    <tbody>
                                        {gameData.characterTemplates.map(t => (
                                            <tr key={t.type}>
                                                <td style={tdSt}>{t.type.charAt(0).toUpperCase() + t.type.slice(1)}</td>
                                                <td style={tdSt}>{t.level}</td>
                                                <td style={tdSt}>{t.health}</td>
                                                <td style={tdSt}>{t.skillDicePools ? `${t.skillDicePools.highCount}x${t.skillDicePools.high}d / ${t.skillDicePools.lowCount}x${t.skillDicePools.low}d` : 'Special'}</td>
                                                <td style={tdSt}>{t.skillDiceTypes ? `${t.skillDiceTypes.highCount}x${t.skillDiceTypes.high} / ${t.skillDiceTypes.lowCount}x${t.skillDiceTypes.low}` : 'Special'}</td>
                                                <td style={tdSt}>{t.abilitySlots}</td>
                                                <td style={tdSt}>{t.maxAbilityLevel}</td>
                                                <td style={tdSt}>{t.rosterSlotCost}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            ))}

                            {/* 3. Weapons */}
                            {printSettings.weapons && gameData.weapons && refCard('Weapons', (
                                <div>
                                    <div style={{fontWeight:'bold', marginBottom:'4px', borderBottom:'1px solid #ccc', paddingBottom:'2px'}}>Ranged</div>
                                    {(gameData.weapons.ranged || []).map(w => (
                                        <div key={w.name} style={{marginBottom:'3px'}}><span style={{fontWeight:'bold'}}>{w.name}</span> — {w.description}</div>
                                    ))}
                                    <div style={{fontWeight:'bold', marginTop:'8px', marginBottom:'4px', borderBottom:'1px solid #ccc', paddingBottom:'2px'}}>Melee</div>
                                    {(gameData.weapons.melee || []).map(w => (
                                        <div key={w.name} style={{marginBottom:'3px'}}><span style={{fontWeight:'bold'}}>{w.name}</span> — {w.description}</div>
                                    ))}
                                </div>
                            ))}

                            {/* 4. Perks */}
                            {printSettings.perks && gameData.perks && refCard('Perks', (
                                <div style={{columnCount:2, columnGap:'12px'}}>
                                    {gameData.perks.map(p => (
                                        <div key={p.name} style={{breakInside:'avoid', marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{p.name}</span>
                                            <span style={{color:'#666'}}> ({p.slotCost} slot{p.slotCost !== 1 ? 's' : ''}, {p.category})</span>
                                            {' — '}{p.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            {/* 5. Genres */}
                            {printSettings.genres && gameData.genres && (() => {
                                const genresToShow = league.genre
                                    ? gameData.genres.filter(g => g.name === league.genre)
                                    : gameData.genres;
                                return refCard('Genres', (
                                    <div>
                                        {genresToShow.map(g => (
                                            <div key={g.name} style={{marginBottom:'8px'}}>
                                                <div style={{fontWeight:'bold', marginBottom:'2px'}}>{g.name}</div>
                                                <div style={{marginBottom:'4px'}}>{g.description}</div>
                                                {g.modifiers.map(mod => (
                                                    <div key={mod.name} style={{marginLeft:'10px', marginBottom:'2px'}}>
                                                        <span style={{fontWeight:'bold'}}>{mod.name}</span> — {mod.description}
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                ));
                            })()}

                            {/* 6. Harrowing Escape */}
                            {printSettings.harrowingEscape && gameData.harrowingEscape && refCard('Harrowing Escape', (
                                <div>
                                    <div style={{fontWeight:'bold', marginBottom:'4px'}}>Full Recovery</div>
                                    <table style={{...tblSt, marginBottom:'10px'}}>
                                        <thead><tr><th style={thSt}>Roll</th><th style={thSt}>Result</th><th style={thSt}>Effect</th></tr></thead>
                                        <tbody>{gameData.harrowingEscape.fullRecovery.map(r => (
                                            <tr key={r.roll}><td style={tdSt}>{r.roll}</td><td style={tdSt}>{r.result}</td><td style={tdSt}>{r.effect}</td></tr>
                                        ))}</tbody>
                                    </table>
                                    <div style={{fontWeight:'bold', marginBottom:'4px'}}>Critical Injury</div>
                                    <table style={tblSt}>
                                        <thead><tr><th style={thSt}>Roll</th><th style={thSt}>Result</th><th style={thSt}>Effect</th></tr></thead>
                                        <tbody>{gameData.harrowingEscape.criticalInjury.map(r => (
                                            <tr key={r.roll}><td style={tdSt}>{r.roll}</td><td style={tdSt}>{r.result}</td><td style={tdSt}>{r.effect}</td></tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            ))}

                            {/* 7. Reputation Table */}
                            {printSettings.reputationTable && gameData.reputationTable && refCard('Reputation Milestones', (
                                <table style={tblSt}>
                                    <thead><tr><th style={thSt}>Rep</th><th style={thSt}>Milestone</th><th style={thSt}>Effect</th></tr></thead>
                                    <tbody>{gameData.reputationTable.map(r => (
                                        <tr key={r.threshold}><td style={tdSt}>{r.threshold}</td><td style={tdSt}>{r.name}</td><td style={tdSt}>{r.description}</td></tr>
                                    ))}</tbody>
                                </table>
                            ))}

                            {/* 8. Secret Society */}
                            {printSettings.secretSociety && (() => {
                                const societyName = league.campaignState?.secretSociety;
                                if (!societyName || !gameData.secretSocieties) return null;
                                const society = gameData.secretSocieties.find(s => s.name === societyName);
                                if (!society) return null;
                                return refCard(`Secret Society: ${society.name}`, (
                                    <div>
                                        {society.ranks.map(rank => (
                                            <div key={rank.rank} style={{marginBottom:'8px'}}>
                                                <div style={{fontWeight:'bold', marginBottom:'2px'}}>Rank {rank.rank} (Rep {rank.reputationRequired}+)</div>
                                                {rank.perks.map(p => (
                                                    <div key={p.name} style={{marginLeft:'10px', marginBottom:'2px'}}>
                                                        <span style={{fontWeight:'bold'}}>{p.name}</span> — {p.description}
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                ));
                            })()}

                            {/* 9. Associate Abilities */}
                            {printSettings.associateAbilities && gameData.associateAbilities && refCard('Associate Abilities', (
                                <div>
                                    {gameData.associateAbilities.map(a => (
                                        <div key={a.name} style={{marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{a.name}</span> — {a.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            {/* 10. Resources Overview */}
                            {printSettings.resourcesOverview && gameData.resourcesOverview && refCard('Resources Overview', (
                                <div>
                                    <div style={{marginBottom:'6px'}}>{gameData.resourcesOverview.description}</div>
                                    <div style={{fontWeight:'bold', marginBottom:'4px', borderBottom:'1px solid #ccc', paddingBottom:'2px'}}>Tips</div>
                                    {gameData.resourcesOverview.tips.map(t => (
                                        <div key={t.name} style={{marginBottom:'3px', marginLeft:'8px'}}>
                                            <span style={{fontWeight:'bold'}}>{t.name}</span> — {t.description}
                                        </div>
                                    ))}
                                    <div style={{fontWeight:'bold', marginTop:'6px', marginBottom:'4px', borderBottom:'1px solid #ccc', paddingBottom:'2px'}}>Dominion</div>
                                    <div style={{marginLeft:'8px'}}>{gameData.resourcesOverview.dominion}</div>
                                </div>
                            ))}

                            {/* 11. Contacts Assets */}
                            {printSettings.contactsAssets && gameData.contactsAssets && refCard('Contacts Assets', (
                                <table style={tblSt}>
                                    <thead><tr><th style={thSt}>Name</th><th style={thSt}>Cost</th><th style={thSt}>Description</th></tr></thead>
                                    <tbody>{gameData.contactsAssets.map(a => (
                                        <tr key={a.name}><td style={tdSt}>{a.name}</td><td style={tdSt}>{a.cost}</td><td style={tdSt}>{a.description}</td></tr>
                                    ))}</tbody>
                                </table>
                            ))}

                            {/* 12. Gear Assets */}
                            {printSettings.gearAssets && gameData.gearAssets && refCard('Gear Assets', (
                                <table style={tblSt}>
                                    <thead><tr><th style={thSt}>Name</th><th style={thSt}>Cost</th><th style={thSt}>Description</th></tr></thead>
                                    <tbody>{gameData.gearAssets.map(a => (
                                        <tr key={a.name}><td style={tdSt}>{a.name}</td><td style={tdSt}>{a.cost}</td><td style={tdSt}>{a.description}</td></tr>
                                    ))}</tbody>
                                </table>
                            ))}

                            {/* 13. Gadgets */}
                            {printSettings.gadgets && gameData.gadgets && refCard('Gadgets', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.gadgets.rules}</div>
                                    <table style={tblSt}>
                                        <thead><tr><th style={thSt}>Name</th><th style={thSt}>Cost</th><th style={thSt}>Description</th></tr></thead>
                                        <tbody>{gameData.gadgets.assets.map(a => (
                                            <tr key={a.name}><td style={tdSt}>{a.name}</td><td style={tdSt}>{a.cost}</td><td style={tdSt}>{a.description}</td></tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            ))}

                            {/* 14. Backup Characters */}
                            {printSettings.backupCharacters && gameData.backupCharacters && refCard('Backup Characters', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.backupCharacters.rules}</div>
                                    <table style={tblSt}>
                                        <thead><tr><th style={thSt}>Name</th><th style={thSt}>Cost</th><th style={thSt}>Skills</th><th style={thSt}>Health</th></tr></thead>
                                        <tbody>{gameData.backupCharacters.assets.map(a => (
                                            <tr key={a.name}><td style={tdSt}>{a.name}</td><td style={tdSt}>{a.cost}</td><td style={tdSt}>{a.skills}</td><td style={tdSt}>{a.health}</td></tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            ))}

                            {/* 15. Mounts */}
                            {printSettings.mounts && gameData.mounts && refCard('Mounts', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.mounts.rules}</div>
                                    {gameData.mounts.abilities.map(a => (
                                        <div key={a.name} style={{marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{a.name}</span> ({a.cost} pt{a.cost !== 1 ? 's' : ''}) — {a.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            {/* 16. Vehicles */}
                            {printSettings.vehicles && gameData.vehicles && refCard('Vehicles', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.vehicles.rules}</div>
                                    <table style={{...tblSt, marginBottom:'8px'}}>
                                        <thead><tr>
                                            <th style={thSt}>Name</th><th style={thSt}>Size</th><th style={thSt}>Pass.</th>
                                            <th style={thSt}>Reliability</th><th style={thSt}>Special</th><th style={thSt}>Cost</th>
                                        </tr></thead>
                                        <tbody>{gameData.vehicles.basic.map(v => (
                                            <tr key={v.name}>
                                                <td style={tdSt}>{v.name}</td><td style={tdSt}>{v.size}</td><td style={tdSt}>{v.passengers}</td>
                                                <td style={tdSt}>{v.reliability}</td><td style={tdSt}>{v.special}</td><td style={tdSt}>{v.cost}</td>
                                            </tr>
                                        ))}</tbody>
                                    </table>
                                    <div style={{fontWeight:'bold', marginBottom:'4px'}}>Special Rules</div>
                                    {gameData.vehicles.specials.map(s => (
                                        <div key={s.name} style={{marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{s.name}</span> — {s.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            {/* 17. Minions */}
                            {printSettings.minions && gameData.minions && refCard('Minions', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.minions.rules}</div>
                                    <table style={tblSt}>
                                        <thead><tr><th style={thSt}>Name</th><th style={thSt}>Cost</th><th style={thSt}>Health</th><th style={thSt}>Skills</th><th style={thSt}>Abilities</th></tr></thead>
                                        <tbody>{gameData.minions.assets.map(a => (
                                            <tr key={a.name}><td style={tdSt}>{a.name}</td><td style={tdSt}>{a.cost}</td><td style={tdSt}>{a.health}</td><td style={tdSt}>{a.skills}</td><td style={tdSt}>{a.abilities}</td></tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            ))}

                            {/* 18. Cult Assets */}
                            {printSettings.cultAssets && gameData.cultAssets && refCard('Cult Assets', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.cultAssets.rules}</div>
                                    {gameData.cultAssets.assets.map(a => (
                                        <div key={a.name} style={{marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{a.name}</span> ({a.cost}) — {a.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            {/* 19. Gifts */}
                            {printSettings.gifts && gameData.gifts && refCard('Gifts', (
                                <div>
                                    <div style={{marginBottom:'6px', fontStyle:'italic'}}>{gameData.gifts.rules}</div>
                                    {gameData.gifts.assets.map(a => (
                                        <div key={a.name} style={{marginBottom:'3px'}}>
                                            <span style={{fontWeight:'bold'}}>{a.name}</span> ({a.cost}) — {a.description}
                                        </div>
                                    ))}
                                </div>
                            ))}

                            </React.Fragment>
                        );
                    })()}
                </div>
            );
        };

        // ==========================================
        // 5k. EMPTY STATE
        // ==========================================
        const EmptyState = ({ league, onAddLeader, onOpenAddModal }) => {
            const hasChars = league.characters.length > 0;
            const hasLeader = league.characters.some(c => c.type === 'leader');
            return (
                <div className="flex-1 flex items-center justify-center p-6">
                    <div className="text-center">
                        {!hasChars ? (
                            <>
                                <Icons.Users size={48} className="mx-auto mb-4" style={{color:'var(--ink-faded)'}} />
                                <h2 className="brand-font text-xl font-bold mb-2" style={{color:'var(--ink)'}}>Assemble Your League</h2>
                                <p className="typewriter text-sm mb-4" style={{color:'var(--ink-faded)'}}>Start by creating your Leader — every league needs one.</p>
                                <button onClick={onAddLeader}
                                    className="px-6 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                    style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>
                                    Create Leader
                                </button>
                            </>
                        ) : (
                            <>
                                <Icons.FileText size={48} className="mx-auto mb-4" style={{color:'var(--ink-faded)'}} />
                                <h2 className="brand-font text-xl font-bold mb-2" style={{color:'var(--ink)'}}>Select a Character</h2>
                                <p className="typewriter text-sm mb-4" style={{color:'var(--ink-faded)'}}>Choose a character from the sidebar to edit their dossier.</p>
                                {!hasLeader && (
                                    <button onClick={onAddLeader}
                                        className="px-6 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                        style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>
                                        Create Leader
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5m. MOBILE TAB BAR
        // ==========================================
        const MobileTabBar = ({ activeTab, onTabChange, hasSelectedChar }) => {
            const tabs = [
                { key: 'roster', label: 'Roster', icon: <Icons.Users size={20} /> },
                { key: 'editor', label: 'Editor', icon: <Icons.Edit2 size={20} />, dimmed: !hasSelectedChar },
                { key: 'perks', label: 'Perks', icon: <Icons.Star size={20} /> },
                { key: 'campaign', label: 'Campaign', icon: <Icons.FileText size={20} /> },
                { key: 'more', label: 'More', icon: <Icons.MoreHorizontal size={20} /> },
            ];
            return (
                <div className="no-print flex justify-around items-center py-1" style={{background:'var(--leather)', borderTop:'2px solid var(--crimson)', flexShrink:0}}>
                    {tabs.map(tab => {
                        const isActive = activeTab === tab.key;
                        return (
                            <button key={tab.key} onClick={() => onTabChange(tab.key)}
                                className="flex flex-col items-center gap-0.5 px-2 py-1 cursor-pointer"
                                style={{
                                    color: isActive ? 'var(--crimson)' : tab.dimmed ? 'var(--ink-faded)' : 'var(--paper)',
                                    opacity: tab.dimmed && !isActive ? 0.4 : 1,
                                    background:'transparent', border:'none',
                                }}>
                                {tab.icon}
                                <span className="typewriter" style={{fontSize:'9px'}}>{tab.label}</span>
                            </button>
                        );
                    })}
                </div>
            );
        };

        // ==========================================
        // 5m2. MOBILE ROSTER (full-screen character list)
        // ==========================================
        const MobileRoster = ({ league, gameData, selectedCharId, onSelectChar, onOpenAddModal }) => {
            const used = getUsedSlots(league, gameData);
            const total = getTotalSlots(league, gameData);
            const groups = [
                { title: 'Leader', chars: league.characters.filter(c => c.type === 'leader') },
                { title: 'Epic', chars: league.characters.filter(c => c.type === 'epic') },
                { title: 'Sidekicks', chars: league.characters.filter(c => c.type === 'sidekick') },
                { title: 'Allies', chars: league.characters.filter(c => c.type === 'ally') },
                { title: 'Followers', chars: league.characters.filter(c => c.type === 'follower') },
                { title: 'Gangs', chars: league.characters.filter(c => c.type === 'gang') },
            ];

            return (
                <div className="flex-1 overflow-y-auto p-3" style={{background:'var(--paper)'}}>
                    <SlotBar used={used} total={total} />
                    <div className="typewriter text-xs uppercase tracking-wider mb-3" style={{color:'var(--crimson)'}}>Field Operatives</div>
                    {groups.map(({ title, chars }) => {
                        if (chars.length === 0) return null;
                        return (
                            <div key={title} className="mb-3">
                                <div className="typewriter text-xs uppercase tracking-wider mb-1" style={{color:'var(--ink-faded)'}}>{title}</div>
                                {chars.map(c => {
                                    const tmpl = getTemplate(gameData, c.type);
                                    const isSelected = selectedCharId === c.id;
                                    const hasEmptyName = !c.name || c.name.trim() === '';
                                    const hasUnassignedSkills = c.type !== 'gang' && c.type !== 'follower' && SKILLS.some(s => c.skillAssignments?.[s]?.count == null || c.skillAssignments?.[s]?.diceType == null);
                                    const incomplete = hasEmptyName || hasUnassignedSkills;
                                    return (
                                        <div key={c.id} onClick={() => onSelectChar(c.id)}
                                            className="p-3 mb-2 rounded cursor-pointer transition-all hover:opacity-90"
                                            style={{
                                                background:'var(--paper-dark)',
                                                border: isSelected ? '2px solid var(--crimson)' : '1px solid var(--border)',
                                                borderLeft: `4px solid ${LEVEL_COLORS[c.type]}`,
                                            }}>
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-2">
                                                    {incomplete && <Icons.AlertTriangle size={14} style={{color:'var(--crimson)'}} />}
                                                    <div>
                                                        <div className="typewriter text-xs uppercase" style={{color: LEVEL_COLORS[c.type]}}>{LEVEL_LABELS[c.type]}</div>
                                                        <div className="brand-font text-sm font-bold" style={{color:'var(--ink)'}}>{c.name || 'Unnamed'}</div>
                                                    </div>
                                                </div>
                                                {tmpl && <span className="typewriter text-xs" style={{color:'var(--ink-faded)'}}>Health: {tmpl.health}</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                    {league.characters.length === 0 && (
                        <div className="text-center py-8">
                            <Icons.Users size={48} className="mx-auto mb-4" style={{color:'var(--ink-faded)'}} />
                            <p className="typewriter text-sm" style={{color:'var(--ink-faded)'}}>No operatives yet. Tap "Add" below to get started.</p>
                        </div>
                    )}
                    <button onClick={onOpenAddModal}
                        className="w-full py-3 rounded typewriter text-sm cursor-pointer hover:opacity-80 flex items-center justify-center gap-1 mt-2"
                        style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>
                        <Icons.Plus size={14} /> Add Character
                    </button>
                </div>
            );
        };

        // ==========================================
        // 5m3. MORE PANEL (mobile genre/settings/export)
        // ==========================================
        const MorePanel = ({ league, gameData, updateLeague, onNavigate }) => {
            const rules = league.optionalRules || {};
            return (
                <div className="flex-1 overflow-y-auto p-4" style={{background:'var(--paper)'}}>
                    <h2 className="brand-font text-lg font-bold mb-4" style={{color:'var(--ink)'}}>League Settings</h2>

                    {/* Genre Selector */}
                    <div className="mb-4 p-3 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                        <div className="typewriter text-xs uppercase tracking-wider mb-2" style={{color:'var(--crimson)'}}>Genre</div>
                        <select
                            value={league.genre || ''}
                            onChange={(e) => updateLeague(l => ({...l, genre: e.target.value || null}))}
                            className="w-full typewriter text-sm px-3 py-2 rounded cursor-pointer outline-none"
                            style={{background:'var(--ink)', color:'var(--paper)', border:'1px solid var(--ink-faded)'}}>
                            <option value="">Classic Pulp</option>
                            {(gameData?.genres || []).map(g => <option key={g.name} value={g.name}>{g.name}</option>)}
                        </select>
                        {league.genre && (() => {
                            const genre = (gameData?.genres || []).find(g => g.name === league.genre);
                            if (!genre) return null;
                            return (
                                <div className="mt-2 flex flex-wrap gap-1">
                                    {(genre.modifiers || []).map(mod => (
                                        <span key={mod.name} className="typewriter text-xs px-2 py-0.5 rounded" style={{background:'rgba(139,26,26,0.15)', color:'var(--crimson)', border:'1px solid rgba(139,26,26,0.3)'}}>
                                            {mod.name}
                                        </span>
                                    ))}
                                </div>
                            );
                        })()}
                    </div>

                    {/* Core Toggles */}
                    <div className="mb-4 p-3 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                        <div className="typewriter text-xs uppercase tracking-wider mb-2" style={{color:'var(--crimson)'}}>Core Rules</div>
                        {[
                            { key: 'weapons', label: 'Weapons', desc: 'Characters may equip weapons' },
                            { key: 'supers', label: 'Supers', desc: 'Allows Epic characters' },
                        ].map(({ key, label, desc }) => (
                            <div key={key} className="flex items-center justify-between p-2 mb-1 rounded cursor-pointer hover:opacity-90"
                                style={{background: rules[key] ? 'var(--leather)' : 'var(--paper)', border: `1px solid ${rules[key] ? 'var(--crimson)' : 'var(--border)'}`}}
                                onClick={() => updateLeague(l => ({...l, optionalRules: {...(l.optionalRules || {}), [key]: !l.optionalRules?.[key]}}))}>
                                <div>
                                    <div className="brand-font text-sm font-bold" style={{color: rules[key] ? 'var(--paper)' : 'var(--ink)'}}>{label}</div>
                                    <div className="typewriter text-xs" style={{color: rules[key] ? 'var(--paper-dark)' : 'var(--ink-faded)'}}>{desc}</div>
                                </div>
                                <div className="w-10 h-6 rounded-full relative flex-shrink-0 ml-2" style={{background: rules[key] ? 'var(--crimson)' : 'var(--border)'}}>
                                    <div className="absolute top-0.5 w-5 h-5 rounded-full transition-all" style={{background:'white', left: rules[key] ? '18px' : '2px'}} />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Navigation Links */}
                    <div className="mb-4 p-3 rounded" style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                        <div className="typewriter text-xs uppercase tracking-wider mb-2" style={{color:'var(--crimson)'}}>More</div>
                        {[
                            { key: 'associates', label: 'Associates', count: league.associates.length },
                            { key: 'settings', label: 'Advanced Settings', count: Object.entries(rules).filter(([k,v]) => v && k !== 'weapons' && k !== 'supers').length },
                        ].map(({ key, label, count }) => (
                            <button key={key} onClick={() => onNavigate(key)}
                                className="w-full text-left p-2 mb-1 rounded cursor-pointer hover:opacity-90 flex items-center justify-between"
                                style={{background:'var(--paper)', border:'1px solid var(--border)'}}>
                                <span className="brand-font text-sm font-bold" style={{color:'var(--ink)'}}>{label}</span>
                                <span className="typewriter text-xs" style={{color:'var(--ink-faded)'}}>{count > 0 ? `(${count})` : ''} ›</span>
                            </button>
                        ))}
                    </div>

                    {/* Actions */}
                    <div className="flex gap-2">
                        <button onClick={() => exportLeagueJSON(league)}
                            className="flex-1 py-2 rounded typewriter text-sm cursor-pointer hover:opacity-80 flex items-center justify-center gap-1"
                            style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>
                            <Icons.Download size={14} /> Export
                        </button>
                        <button onClick={() => window.print()}
                            className="flex-1 py-2 rounded typewriter text-sm cursor-pointer hover:opacity-80 flex items-center justify-center gap-1"
                            style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>
                            <Icons.Printer size={14} /> Print
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. LEAGUE SELECTOR COMPONENT
        // ==========================================
        const LeagueSelector = ({ gameData, onSelect, onCreate }) => {
            const [leagues, setLeagues] = useState(() => loadLeagueIndex());
            const importRef = useRef(null);
            const handleImport = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    const league = await importLeagueJSON(file);
                    if (!league.id) league.id = generateUUID();
                    saveLeague(league);
                    onSelect(league);
                } catch { alert('Invalid league file'); }
            };
            const handleDelete = (id, name) => {
                if (!confirm(`Delete league "${name}"?`)) return;
                deleteLeague(id);
                setLeagues(loadLeagueIndex());
            };
            return (
                <div className="h-full flex items-center justify-center" style={{background:'var(--leather)'}}>
                    <div className="p-8 rounded-lg max-w-md w-full" style={{background:'var(--paper)', border:'2px solid var(--border)'}}>
                        <h1 className="text-2xl font-bold brand-font mb-6 text-center" style={{color:'var(--crimson)'}}>LEAGUE DOSSIERS</h1>
                        {leagues.length > 0 && (
                            <div className="mb-6 max-h-64 overflow-y-auto">
                                {leagues.sort((a,b) => b.lastModified - a.lastModified).map(entry => (
                                    <div key={entry.id} className="flex items-center gap-2 mb-2">
                                        <button onClick={() => onSelect(loadLeague(entry.id))}
                                            className="flex-1 text-left p-3 rounded cursor-pointer transition-opacity hover:opacity-80"
                                            style={{background:'var(--paper-dark)', border:'1px solid var(--border)'}}>
                                            <div className="font-bold brand-font" style={{color:'var(--ink)'}}>{entry.name}</div>
                                            <div className="text-xs typewriter" style={{color:'var(--ink-faded)'}}>
                                                {new Date(entry.lastModified).toLocaleDateString()}
                                            </div>
                                        </button>
                                        <button onClick={() => handleDelete(entry.id, entry.name)}
                                            className="p-2 rounded cursor-pointer hover:opacity-80" style={{color:'var(--crimson)'}}>
                                            <Icons.Trash2 size={16} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="flex gap-3">
                            <button onClick={onCreate} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--crimson)', color:'var(--paper)', border:'none'}}>New League</button>
                            <input ref={importRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
                            <button onClick={() => importRef.current.click()} className="flex-1 px-4 py-3 rounded typewriter cursor-pointer hover:opacity-80"
                                style={{background:'var(--leather)', color:'var(--paper)', border:'none'}}>Import</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 7. APP INIT
        // ==========================================
        const App = () => {
            const [gameData, setGameData] = useState(null);
            const [league, setLeague] = useState(null);
            const [showLeagueSelector, setShowLeagueSelector] = useState(true);
            const [selectedCharId, setSelectedCharId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [activeView, setActiveView] = useState(null); // null, 'character', 'perks', 'associates', 'campaign', 'settings'
            const [toast, setToast] = useState(null);
            const isMobile = useIsMobile();
            const [mobileTab, setMobileTab] = useState('roster');

            const showToast = (msg, type='info') => { setToast({msg, type}); setTimeout(() => setToast(null), 3000); };

            // Auto-save on league change
            useEffect(() => {
                if (league) {
                    if (!saveLeague(league)) showToast('Storage full — export as JSON to free space', 'error');
                }
            }, [league]);

            const updateLeague = useCallback((updater) => {
                setLeague(prev => typeof updater === 'function' ? updater(prev) : updater);
            }, []);

            const addCharacter = useCallback((type) => {
                const tmpl = gameData ? getTemplate(gameData, type) : null;
                const newChar = EMPTY_CHARACTER(type, tmpl ? {} : undefined);
                // For follower, pre-fill all skills to 1d6
                if (type === 'follower') {
                    SKILLS.forEach(s => { newChar.skillAssignments[s] = { count: 1, diceType: 'd6' }; });
                }
                // For ally, pre-fill all dice types to d6
                if (type === 'ally') {
                    SKILLS.forEach(s => { newChar.skillAssignments[s] = { ...newChar.skillAssignments[s], diceType: 'd6' }; });
                }
                // Epic: already has freeAbilities: ['Monster'] and extraAbilitySlots: 0 from EMPTY_CHARACTER
                updateLeague(l => ({ ...l, characters: [...l.characters, newChar] }));
                setSelectedCharId(newChar.id);
                setActiveView('character');
            }, [gameData, updateLeague]);

            const updateCharacter = useCallback((updatedChar) => {
                updateLeague(l => ({
                    ...l,
                    characters: l.characters.map(c => c.id === updatedChar.id ? updatedChar : c),
                }));
            }, [updateLeague]);

            const deleteCharacter = useCallback((charId) => {
                updateLeague(l => ({ ...l, characters: l.characters.filter(c => c.id !== charId) }));
                setSelectedCharId(prev => prev === charId ? null : prev);
                setActiveView(prev => prev === 'character' ? null : prev);
            }, [updateLeague]);

            const handleSelectChar = useCallback((id) => {
                setSelectedCharId(id);
                setActiveView('character');
            }, []);

            const handleSetView = useCallback((view) => {
                setActiveView(view);
                if (view !== 'character') setSelectedCharId(null);
            }, []);

            const handleMobileSelectChar = useCallback((id) => {
                setSelectedCharId(id);
                setActiveView('character');
                setMobileTab('editor');
            }, []);

            const handleMobileTabChange = useCallback((tab) => {
                setMobileTab(tab);
                if (tab === 'perks') setActiveView('perks');
                else if (tab === 'campaign') setActiveView('campaign');
                else if (tab === 'roster') { setActiveView(null); }
                else if (tab === 'editor') { setActiveView('character'); }
                else if (tab === 'more') { setActiveView(null); }
            }, []);

            const handleMoreNavigate = useCallback((key) => {
                setActiveView(key);
                setMobileTab('more');
            }, []);

            if (!gameData) return <DataLoader onLoad={setGameData} />;
            if (showLeagueSelector || !league) return <LeagueSelector gameData={gameData} onSelect={(l) => { setLeague(l); setShowLeagueSelector(false); }} onCreate={() => { const l = EMPTY_LEAGUE(); setLeague(l); setShowLeagueSelector(false); }} />;

            const selectedChar = activeView === 'character' ? league.characters.find(c => c.id === selectedCharId) : null;

            const renderCenterPanel = () => {
                if (activeView === 'perks') {
                    return <PerkBrowser league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (activeView === 'associates') {
                    return <AssociateBuilder league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (activeView === 'campaign') {
                    return <CampaignPanel league={league} gameData={gameData} updateLeague={updateLeague} updateCharacter={updateCharacter} />;
                }
                if (activeView === 'settings') {
                    return <SettingsPanel league={league} gameData={gameData} updateLeague={updateLeague} />;
                }
                if (selectedChar) {
                    return (
                        <CharacterEditor
                            key={selectedChar.id}
                            character={selectedChar}
                            gameData={gameData}
                            league={league}
                            onUpdate={updateCharacter}
                            onDelete={deleteCharacter}
                        />
                    );
                }
                return (
                    <EmptyState
                        league={league}
                        onAddLeader={() => addCharacter('leader')}
                        onOpenAddModal={() => setShowAddModal(true)}
                    />
                );
            };

            const renderMobileContent = () => {
                if (activeView === 'associates' || activeView === 'settings') {
                    return (
                        <div className="flex-1 flex flex-col overflow-hidden">
                            <div className="p-2 flex items-center gap-2" style={{background:'var(--paper-dark)', borderBottom:'1px solid var(--border)'}}>
                                <button onClick={() => { setActiveView(null); setMobileTab('more'); }} className="cursor-pointer hover:opacity-80 flex items-center gap-1" style={{color:'var(--crimson)', background:'transparent', border:'none'}}>
                                    <Icons.ArrowLeft size={16} />
                                    <span className="typewriter text-xs">Back</span>
                                </button>
                                <span className="typewriter text-xs uppercase tracking-wider" style={{color:'var(--ink-faded)'}}>{activeView === 'associates' ? 'Associates' : 'Advanced Settings'}</span>
                            </div>
                            <div className="flex-1 overflow-y-auto">
                                {activeView === 'associates'
                                    ? <AssociateBuilder league={league} gameData={gameData} updateLeague={updateLeague} />
                                    : <SettingsPanel league={league} gameData={gameData} updateLeague={updateLeague} />
                                }
                            </div>
                        </div>
                    );
                }

                if (mobileTab === 'roster') {
                    return <MobileRoster league={league} gameData={gameData} selectedCharId={selectedCharId} onSelectChar={handleMobileSelectChar} onOpenAddModal={() => setShowAddModal(true)} />;
                }
                if (mobileTab === 'editor') {
                    const char = league.characters.find(c => c.id === selectedCharId);
                    if (char) return <CharacterEditor key={char.id} character={char} gameData={gameData} league={league} onUpdate={updateCharacter} onDelete={(id) => { deleteCharacter(id); setMobileTab('roster'); }} />;
                    return <EmptyState league={league} onAddLeader={() => addCharacter('leader')} onOpenAddModal={() => setShowAddModal(true)} />;
                }
                if (mobileTab === 'perks') return <PerkBrowser league={league} gameData={gameData} updateLeague={updateLeague} />;
                if (mobileTab === 'campaign') return <CampaignPanel league={league} gameData={gameData} updateLeague={updateLeague} updateCharacter={updateCharacter} />;
                if (mobileTab === 'more') return <MorePanel league={league} gameData={gameData} updateLeague={updateLeague} onNavigate={handleMoreNavigate} />;
                return null;
            };

            return (
                <div className="h-full flex flex-col" style={{background:'var(--paper)'}}>
                    <TopBar league={league} updateLeague={updateLeague} gameData={gameData} isMobile={isMobile} onBack={() => { setShowLeagueSelector(true); setSelectedCharId(null); setActiveView(null); }} />

                    {isMobile ? (
                        <div className="flex-1 overflow-y-auto no-print">
                            {renderMobileContent()}
                        </div>
                    ) : (
                        <div className="flex-1 overflow-hidden flex no-print">
                            <RosterSidebar
                                league={league} gameData={gameData}
                                selectedCharId={selectedCharId}
                                onSelectChar={handleSelectChar}
                                onOpenAddModal={() => setShowAddModal(true)}
                                activeView={activeView}
                                onSetView={handleSetView}
                            />
                            {renderCenterPanel()}
                        </div>
                    )}

                    <PrintableRoster league={league} gameData={gameData} />

                    {isMobile && (
                        <MobileTabBar activeTab={mobileTab} onTabChange={handleMobileTabChange} hasSelectedChar={!!selectedCharId} />
                    )}

                    {showAddModal && (
                        <AddCharacterModal
                            league={league} gameData={gameData}
                            onAdd={addCharacter}
                            onClose={() => setShowAddModal(false)}
                        />
                    )}

                    {toast && <div className="fixed top-4 right-4 px-4 py-2 rounded shadow-lg typewriter text-sm toast z-50" style={{background: toast.type==='error'?'var(--crimson)':'var(--leather)', color:'var(--paper)'}}>{toast.msg}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
